<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFBF5"/>
      <stop offset="50%" stop-color="#FEF3C7"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 모 circle -->
  <circle cx="380" cy="315" r="140" fill="#F59E0B" opacity="0.9"/>
  <text x="380" y="360" text-anchor="middle" font-family="Pretendard, system-ui, sans-serif" font-size="160" font-weight="900" fill="white">모</text>

  <!-- vs -->
  <text x="600" y="345" text-anchor="middle" font-family="Pretendard, system-ui, sans-serif" font-size="60" font-weight="700" fill="#6B7280">또는</text>

  <!-- 도 circle -->
  <circle cx="820" cy="315" r="140" fill="#3B82F6" opacity="0.9"/>
  <text x="820" y="360" text-anchor="middle" font-family="Pretendard, system-ui, sans-serif" font-size="160" font-weight="900" fill="white">도</text>

  <!-- title -->
  <text x="600" y="100" text-anchor="middle" font-family="Pretendard, system-ui, sans-serif" font-size="64" font-weight="900" fill="url(#title)">모도챗</text>

  <!-- subtitle -->
  <text x="600" y="540" text-anchor="middle" font-family="Pretendard, system-ui, sans-serif" font-size="36" font-weight="600" fill="#1F2937">무조건 칭찬 또는 무조건 디스</text>
  <text x="600" y="585" text-anchor="middle" font-family="Pretendard, system-ui, sans-serif" font-size="22" font-weight="500" fill="#6B7280">중간은 없어요</text>
</svg>
